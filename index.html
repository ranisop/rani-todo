        };

        window.deleteSubject = (subjId) => {
            if(!confirm('이 과목을 삭제하시겠나요? (모든 강의 데이터가 사라집니다)')) return;
            window.subjects = window.subjects.filter(s => s.id !== subjId);
            window.openedSubjectIds.delete(subjId);
            window.closeSubjectModal();
            window.renderLectures();
            window.saveLecturesToCloud();
        };

        // --- 전체 일정 요약 ---
        window.openedOverviewSubjectIds = new Set(); // 전체 일정에서 열려있는 과목 ID

        window.openOverview = () => {
            _editSubjectId = 'OVERVIEW';
            document.getElementById('subjectModalTitle').innerText = '📅 전체 강의 일정';
            window.renderOverviewBody();

            const footer = document.getElementById('subjectModalFooter');
            footer.innerHTML = `
                <button class="modal-save-btn" onclick="window.closeSubjectModal()">닫기</button>
            `;
            document.getElementById('subjectModal').classList.add('open');
        };

        window.toggleOverviewSubject = (subjId) => {
            if(window.openedOverviewSubjectIds.has(subjId)) {
                window.openedOverviewSubjectIds.delete(subjId);
            } else {
                window.openedOverviewSubjectIds.add(subjId);
            }
            window.renderOverviewBody();
        }

        window.renderOverviewBody = () => {
            const body = document.getElementById('subjectModalBody');
            if(window.subjects.length === 0) {
                body.innerHTML = `<div style="text-align:center; padding:40px; color:var(--text-muted);">등록된 과목이 없습니다.</div>`;
                return;
            }
            
            let html = '';
            window.subjects.forEach(subj => {
                const schedule = (subj.weeks||[]).map(w => {
                    const doneL = (w.lectures||[]).filter(l => l.done).length;
                    const totalL = (w.lectures||[]).length;
                    return { week: w, done: doneL, total: totalL, isAllDone: totalL > 0 && doneL === totalL };
                });

                const isOpen = window.openedOverviewSubjectIds.has(subj.id);

                html += `
                    <div style="margin-bottom:12px; border: 1px solid var(--border-color); border-radius: 12px; overflow: hidden;">
                        <div onclick="window.toggleOverviewSubject('${subj.id}')" style="display:flex; align-items:center; gap:10px; padding:12px 16px; cursor:pointer; background-color: var(--card-bg);">
                            <div style="width:12px; height:12px; border-radius:50%; background:${subj.color};"></div>
                            <div style="flex:1; font-weight:700; font-size:14px; color:var(--text-main);">${subj.name}</div>
                            <div style="font-size:12px; color:var(--text-muted); transition: transform 0.2s; transform: ${isOpen ? 'rotate(180deg)' : 'rotate(0deg)'}">▼</div>
                        </div>
                        <div style="display: ${isOpen ? 'block' : 'none'}; padding: 0 16px 16px; background-color: white;">
                            <table class="overview-table">
                                <thead>
                                    <tr>
                                        <th style="width:70px;">주차</th>
                                        <th>마감일</th>
                                        <th style="text-align:right;">상태</th>
                                    </tr>
                                </thead>
                                <tbody>
                `;

                if(schedule.length === 0) {
                    html += `<tr><td colspan="3" style="text-align:center; padding:20px; color:var(--text-muted); font-size:12px;">보여줄 일정이 없어요.</td></tr>`;
                } else {
                    schedule.forEach(item => {
                        const dlClass = window.getDeadlineClass(item.week.deadline, item.isAllDone);
                        const dlText = item.week.deadline ? item.week.deadline.substring(5).replace('-','/') : '-';
                        html += `
                            <tr>
                                <td style="font-weight:600;">${item.week.weekNum}주차</td>
                                <td>
                                    <div class="week-deadline ${dlClass}" style="display:inline-block">${dlText}</div>
                                </td>
                                <td style="text-align:right;">
                                    <div style="font-size:11px; font-weight:700; color:var(--text-muted); margin-bottom:4px;">
                                        ${item.done}/${item.total}
                                    </div>
                                    <div class="progress-bar-track" style="width:40px; height:4px; display:inline-block;">
                                        <div class="progress-bar-fill" style="width:${Math.round(item.done/item.total*100)}%; background-color:${subj.color}"></div>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                }
                html += `</tbody></table></div></div>`;
            });
            body.innerHTML = html;
        };

        window.saveCategoriesToCloud = async () => {
            if(!currentUser) return;
            const catDocRef = doc(db, "users", currentUser.uid, "data", "categories");
            try {
                await setDoc(catDocRef, { items: window.categories });
            } catch(e) {
                console.error("카테고리 저장 실패:", e);
            }
        }

        window.formatDateKey = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        window.getStartOfWeek = (date) => {
            const temp = new Date(date);
            const day = temp.getDay();
            const diff = temp.getDate() - day; 
            return new Date(temp.setDate(diff));
        };

        window.getFirstDayOfMonth = (date) => {
            return new Date(date.getFullYear(), date.getMonth(), 1);
        };
        
        window.getCategoryColor = (catId) => {
            const cat = window.categories.find(c => c.id === catId);
            return cat ? cat.color : '#EFEFEF'; 
        };

        window.initCategorySelector = () => {
            const selector = document.getElementById('categorySelector');
            selector.innerHTML = '';
            
            window.categories.forEach(cat => {
                const item = document.createElement('div');
                item.className = 'cat-select-item' + (window.activeCategoryId === cat.id ? ' active' : '');
                
                item.innerHTML = `
                    <div class="cat-color-circle" style="background-color: ${cat.color}"></div>
                    <div class="cat-select-label">${cat.name}</div>
                `;
                
                item.onclick = () => {
                    window.activeCategoryId = cat.id;
                    window.initCategorySelector(); 
                    window.updateAddButtonColor();
                };
                selector.appendChild(item);
            });
            window.updateAddButtonColor();
        };

        window.updateAddButtonColor = () => {
            const btn = document.getElementById('addTodoBtn');
            if(!btn) return;
            const color = window.getCategoryColor(window.activeCategoryId);
            btn.style.backgroundColor = color;
            btn.style.color = 'rgba(0,0,0,0.6)';
        };

        window.openSettings = () => {
            const modal = document.getElementById('settingModal');
            window.renderSettingsCategories();
            modal.style.display = 'flex';
        };

        window.renderSettingsCategories = () => {
            const list = document.getElementById('catEditList');
            list.innerHTML = '';

            window.categories.forEach((cat, index) => {
                const item = document.createElement('div');
                item.className = 'cat-edit-item';
                
                // 첫번째와 마지막 항목 버튼 가리기
                const upDisabled = index === 0 ? 'visibility:hidden' : '';
                const downDisabled = index === window.categories.length - 1 ? 'visibility:hidden' : '';

                item.innerHTML = `
                    <div class="cat-order-controls">
                        <button class="cat-order-btn" style="${upDisabled}" onclick="window.moveCategory(${index}, -1)">▲</button>
                        <button class="cat-order-btn" style="${downDisabled}" onclick="window.moveCategory(${index}, 1)">▼</button>
                    </div>
                    <input type="color" class="cat-edit-color" id="color_${cat.id}" value="${cat.color}">
                    <input type="text" class="cat-edit-name" id="name_${cat.id}" value="${cat.name}" maxlength="8">
                    <button class="cat-delete-btn" onclick="window.removeCategory('${cat.id}')" title="삭제">×</button>
                `;
                list.appendChild(item);
            });
        };

        window.moveCategory = (index, dir) => {
            window.categories.forEach(cat => {
                const nameInput = document.getElementById(`name_${cat.id}`);
                const colorInput = document.getElementById(`color_${cat.id}`);
                if (nameInput && colorInput) {
                    cat.name = nameInput.value.trim() || '이름없음';
                    cat.color = colorInput.value;
                }
            });

            const targetIndex = index + dir;
            if (targetIndex >= 0 && targetIndex < window.categories.length) {
                const temp = window.categories[index];
                window.categories[index] = window.categories[targetIndex];
                window.categories[targetIndex] = temp;
                window.renderSettingsCategories();
                
                setTimeout(() => {
                    const list = document.getElementById('catEditList');
                    if (list.children[targetIndex]) {
                        list.children[targetIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }
                }, 10);
            }
        };

        window.addNewCategory = () => {
            // 새 카테고리의 기본 색상 (랜덤 파스텔 톤)
            const pastelColors = ['#FFCBCB', '#FDF5DF', '#C9E4DE', '#F1DDF2', '#D8E2DC', '#FFE5D9', '#E8E8E4'];
            const randomColor = pastelColors[Math.floor(Math.random() * pastelColors.length)];
            const newId = 'cat_' + Date.now();
            
            window.categories.push({
                id: newId,
                name: '새 카테고리',
                color: randomColor
            });
            window.renderSettingsCategories();
            // 스크롤 맨 아래로
            const list = document.getElementById('catEditList');
            list.scrollTop = list.scrollHeight;
        };

        window.removeCategory = (catId) => {
            if(window.categories.length <= 1) {
                alert("최소 1개의 카테고리는 남겨두어야 합니다!");
                return;
            }
            if(confirm("이 카테고리를 삭제하시겠습니까?\n(기존에 등록된 할 일 목록의 카테고리는 초기화됩니다.)")) {
                window.categories = window.categories.filter(c => c.id !== catId);
                window.renderSettingsCategories();
            }
        };

        window.closeSettings = () => {
            document.getElementById('settingModal').style.display = 'none';
        };

        window.saveSettings = () => {
            // 현재 입력된 값들을 categories 배열에 덮어씀
            window.categories.forEach(cat => {
                const nameInput = document.getElementById(`name_${cat.id}`);
                const colorInput = document.getElementById(`color_${cat.id}`);
                if (nameInput && colorInput) {
                    cat.name = nameInput.value.trim() || '이름없음';
                    cat.color = colorInput.value;
                }
            });
            
            window.saveCategoriesToCloud(); 
            window.closeSettings();
            
            // 만약 선택된 카테고리가 삭제되었다면 첫번째로 변경
            if(!window.categories.find(c => c.id === window.activeCategoryId)) {
                window.activeCategoryId = window.categories[0].id;
            }
            
            window.initCategorySelector(); 
            window.renderCalendar(); 
            window.renderTodos(); 
        };

        /* 피드백 반영: 클로버 잎사귀(4개 기준) 구역별로 정확히 분할하기 위해
           gradient 각도를 0-90, 90-180, 180-270, 270-360도로 고정하여 뿌려줍니다.
           이렇게 하면 선이 겹치거나 지저분하지 않고 네잎클로버 잎사귀마다 색상이 깨끗하게 먹힙니다. */
        window.getGradientStyleForDate = (dateKey) => {
            const dayTodos = window.todos[dateKey] || [];
            const completedCats = new Set();
            
            dayTodos.forEach(t => {
                if(t.completed) completedCats.add(t.categoryId);
            });

            if(completedCats.size === 0) return ''; 

            const colors = Array.from(completedCats).map(id => window.getCategoryColor(id));
            
            if (colors.length === 1) {
                return `background-color: ${colors[0]};`; 
            }

            let qColors = [];
            // 색상 개수에 따라 4개의 잎사귀 칸을 채웁니다 (위-오른쪽, 아래-오른쪽, 아래-왼쪽, 위-왼쪽)
            if (colors.length === 2) {
                qColors = [colors[0], colors[0], colors[1], colors[1]]; // 반반
            } else if (colors.length === 3) {
                qColors = [colors[0], colors[1], colors[2], colors[0]];
            } else {
                qColors = [colors[0], colors[1], colors[2], colors[3]]; // 최대로 4개까지만 표시
            }

            return `background: conic-gradient(
                ${qColors[0]} 0deg 90deg, 
                ${qColors[1]} 90deg 180deg, 
                ${qColors[2]} 180deg 270deg, 
                ${qColors[3]} 270deg 360deg
            );`;
        };

        window.updateMonthLabel = () => {
            const y = currentRefDate.getFullYear();
            const m = currentRefDate.getMonth() + 1;
            document.getElementById('monthLabel').innerText = `${y}년 ${m}월`;
        };

        window.setViewMode = (mode) => {
            viewMode = mode;
            document.getElementById('btnWeekly').classList.toggle('active', mode === 'weekly');
            document.getElementById('btnMonthly').classList.toggle('active', mode === 'monthly');
            window.renderCalendar();
        };

        window.shiftCalendar = (offset) => {
            if (viewMode === 'weekly') {
                currentRefDate.setDate(currentRefDate.getDate() + (offset * 7));
                const newWeekStart = window.getStartOfWeek(currentRefDate);
                currentDate = new Date(newWeekStart);
                currentRefDate = new Date(newWeekStart);
            } else {
                currentRefDate.setMonth(currentRefDate.getMonth() + offset);
                const newMonthStart = window.getFirstDayOfMonth(currentRefDate);
                currentDate = new Date(newMonthStart);
                currentRefDate = new Date(newMonthStart);
            }
            window.renderCalendar();
            window.renderTodos();
        };

        window.renderCalendar = () => {
            window.updateMonthLabel();
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            
            const datesToRender = [];

            if (viewMode === 'weekly') {
                const startOfWeek = window.getStartOfWeek(currentRefDate);
                for (let i = 0; i < 7; i++) {
                    const d = new Date(startOfWeek);
                    d.setDate(d.getDate() + i);
                    datesToRender.push({ date: d, isOtherMonth: false });
                }
            } else { 
                const year = currentRefDate.getFullYear();
                const month = currentRefDate.getMonth();
                const firstDay = new Date(year, month, 1);
                const lastDay = new Date(year, month + 1, 0);
                
                const startDayIndex = firstDay.getDay();
                for (let i = startDayIndex - 1; i >= 0; i--) {
                    const d = new Date(year, month, -i);
                    datesToRender.push({ date: d, isOtherMonth: true });
                }
                
                for (let i = 1; i <= lastDay.getDate(); i++) {
                    const d = new Date(year, month, i);
                    datesToRender.push({ date: d, isOtherMonth: false });
                }
                
                const endDayIndex = lastDay.getDay();
                if (endDayIndex < 6) {
                    for (let i = 1; i <= 6 - endDayIndex; i++) {
                        const d = new Date(year, month + 1, i);
                        datesToRender.push({ date: d, isOtherMonth: true });
                    }
                }
            }

            datesToRender.forEach(item => {
                const dayDate = item.date;
                const dateKey = window.formatDateKey(dayDate);
                const isSelected = dateKey === window.formatDateKey(currentDate);
                const isOtherMonth = item.isOtherMonth;
                
                let totalCount = window.todos[dateKey] ? window.todos[dateKey].length : 0;
                
                // 루틴 개수 합산 (중복 제외 및 삭제 처리(tombstone) 제외)
                const routinesForDay = window.routines.filter(r => r.startDate <= dateKey && r.endDate >= dateKey);
                routinesForDay.forEach(r => {
                    const dayTodos = window.todos[dateKey] || [];
                    const existing = dayTodos.find(t => t.routineId === r.id);
                    if(!existing) {
                        totalCount++; // 아직 생성/조작 안 된 가상 루틴
                    } else if (existing && !existing.deleted) {
                        // 이미 실체화 되었지만 완전히 삭제된 게 아님 (위에서 이미 count 됨)
                    }
                });

                // 삭제된 항목(tombstone)은 카운트에서 빼기
                if(window.todos[dateKey]) {
                    const deletedCount = window.todos[dateKey].filter(t => t.deleted).length;
                    totalCount -= deletedCount;
                }

                const bgColorStyle = window.getGradientStyleForDate(dateKey);
                const hasColorStr = bgColorStyle ? 'has-color' : '';

                const cell = document.createElement('div');
                cell.className = 'day-cell' 
                    + (isSelected ? ' selected' : '') 
                    + (isOtherMonth ? ' other-month' : '');
                
                cell.onclick = () => window.selectDate(dayDate);

                const countText = totalCount > 0 ? totalCount : '';

                cell.innerHTML = `
                    <div class="day-num ${hasColorStr}" style="${bgColorStyle}">
                        ${dayDate.getDate()}
                    </div>
                    <div class="todo-count">${countText}</div>
                `;
                
                grid.appendChild(cell);
            });
        };

        window.selectDate = (date) => {
            currentDate = new Date(date);
            currentRefDate = new Date(date); 
            window.renderCalendar();
            window.renderTodos();
        };

        window.goToToday = () => {
            const today = new Date();
            currentDate = today;
            currentRefDate = today;
            window.renderCalendar();
            window.renderTodos();
        };
        
        window.renderTodos = () => {
            const dateKey = window.formatDateKey(currentDate);
            const daysOfKorea = ['일', '월', '화', '수', '목', '금', '토'];
            
            document.getElementById('selectedDateLabel').innerText = 
                `${currentDate.getMonth() + 1}월 ${currentDate.getDate()}일 (${daysOfKorea[currentDate.getDay()]})`;

            const container = document.getElementById('todoListContainer');
            const emptyState = document.getElementById('emptyState');
            container.innerHTML = '';

            const dayTodos = [...(window.todos[dateKey] || [])];
            
            // 루틴 추가 로직
            const curDateStr = window.formatDateKey(currentDate);
            window.routines.forEach(rout => {
                if(rout.startDate <= curDateStr && rout.endDate >= curDateStr) {
                    // 이미 완료 처리되어 todos에 있는 루틴인지 확인 (id나 routineId 활용)
                    const exists = dayTodos.find(t => t.routineId === rout.id);
                    if(!exists) {
                        dayTodos.push({
                            id: 'rout_' + rout.id,
                            text: rout.text,
                            completed: false,
                            categoryId: rout.categoryId,
                            routineId: rout.id,
                            isRoutine: true
                        });
                    }
                }
            });

            if (dayTodos.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                
                const grouped = {};
                dayTodos.forEach(todo => {
                    if(todo.deleted) return; // 삭제 처리된 항목(tombstone)은 렌더링 제외
                    const catTarget = window.categories.find(c => c.id === todo.categoryId) ? todo.categoryId : window.categories[0].id;
                    if(!grouped[catTarget]) grouped[catTarget] = [];
                    grouped[catTarget].push(todo);
                });

                window.categories.forEach(cat => {
                    const catTodos = grouped[cat.id] || [];
                    
                    const groupDiv = document.createElement('div');
                    groupDiv.className = 'category-group';
                    
                    groupDiv.innerHTML = `
                        <div class="category-header">
                            <div class="category-color-badge" style="background-color: ${cat.color}"></div>
                            <div class="category-name">${cat.name}</div>
                        </div>
                        <ul class="todo-list" id="list-${cat.id}"
                            ondragover="window.allowDrop(event)"
                            ondragleave="window.leaveDrop(event)"
                            ondrop="window.dropTodo(event, '${cat.id}')"></ul>
                    `;
                    container.appendChild(groupDiv);
                    
                    const ul = groupDiv.querySelector(`#list-${cat.id}`);
                    
                    catTodos.forEach(todo => {
                        const itemWrap = document.createElement('div');
                        itemWrap.className = 'todo-item-wrap';
                        itemWrap.id = `wrap-${todo.id}`;

                        const li = document.createElement('li');
                        li.className = 'todo-item' + (todo.completed ? ' completed' : '');
                        li.draggable = true;
                        li.onclick = (e) => {
                            if (e.target.classList.contains('todo-checkbox') || e.target.classList.contains('delete-btn')) return;
                            window.toggleTodoDetail(todo.id);
                        };
                        li.ondragstart = (e) => window.dragTodoStart(e, todo.id);
                        li.ondragend = (e) => { e.target.style.opacity = '1'; };
                        
                        let checkboxStyle = '';
                        if(todo.completed) {
                            checkboxStyle = `background-color: ${cat.color}; border-color: ${cat.color};`;
                        }
                        
                        const memoHtml = todo.memo ? `<div class="todo-memo-display">${todo.memo}</div>` : '';

                        li.innerHTML = `
                            <div class="todo-checkbox ${todo.completed ? 'completed' : ''}" 
                                 style="${checkboxStyle}"
                                 onclick="window.toggleTodo('${todo.id}')"></div>
                            <div style="flex:1;">
                                <div class="todo-text">${todo.text}</div>
                                ${memoHtml}
                            </div>
                            <div class="todo-actions">
                                <button class="delete-btn" onclick="window.deleteTodo('${todo.id}')" title="삭제">×</button>
                            </div>
                        `;

                        // 상세 패널 (이름 수정 + 날짜 변경 + 메모)
                        const detailPanel = document.createElement('div');
                        detailPanel.className = 'todo-detail-panel';
                        detailPanel.id = `detail-${todo.id}`;
                        detailPanel.innerHTML = `
                            <div class="todo-detail-row">
                                <div class="todo-detail-label">내용</div>
                                <div style="display:flex; flex:1; gap:4px;">
                                    <input type="text" class="todo-memo-input" style="height:32px; padding:0 8px;" value="${todo.text}">
                                    <button class="todo-detail-save-btn" style="width:auto; padding:0 12px; margin:0;" onclick="window.updateTodoText('${todo.id}', this.previousElementSibling.value)">이름 변경</button>
                                </div>
                            </div>
                            <div class="todo-detail-row">
                                <div class="todo-detail-label">날짜</div>
                                <input type="date" class="todo-date-input" value="${dateKey}" onchange="window.updateTodoDate('${todo.id}', this.value)">
                            </div>
                            <div class="todo-detail-row">
                                <div class="todo-detail-label">메모</div>
                                <textarea class="todo-memo-input" placeholder="메모를 입력하세요...">${todo.memo || ''}</textarea>
                            </div>
                            <button class="todo-detail-save-btn" onclick="window.updateTodoMemo('${todo.id}', this.previousElementSibling.querySelector('textarea').value)">메모 저장</button>
                        `;

                        // --- 순서 변경을 위한 개별 항목 드롭 이벤트 ---
                        li.ondragover = (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            const bounding = li.getBoundingClientRect();
                            const offset = bounding.y + (bounding.height / 2);
                            if (e.clientY - offset > 0) {
                                li.style.borderBottom = "2px dashed #999";
                                li.style.borderTop = "";
                            } else {
                                li.style.borderTop = "2px dashed #999";
                                li.style.borderBottom = "";
                            }
                        };
                        li.ondragleave = (e) => {
                            li.style.borderTop = "";
                            li.style.borderBottom = "";
                        };
                        li.ondrop = (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            li.style.borderTop = "";
                            li.style.borderBottom = "";
                            const strId = e.dataTransfer.getData("text/plain");
                            const dragTodoId = parseInt(strId, 10);
                            if (dragTodoId && dragTodoId !== todo.id) {
                                const bounding = li.getBoundingClientRect();
                                const offset = bounding.y + (bounding.height / 2);
                                const insertAfter = e.clientY - offset > 0;
                                window.reorderTodo(dragTodoId, todo.id, cat.id, insertAfter);
                            }
                        };
                        
                        itemWrap.appendChild(li);
                        itemWrap.appendChild(detailPanel);
                        ul.appendChild(itemWrap);
                    });
                });
            }
        };

        window.addTodo = (event) => {
            event.preventDefault();
            const input = document.getElementById('todoInput');
            const text = input.value.trim();
            if (!text) return;

            const dateKey = window.formatDateKey(currentDate);
            if (!window.todos[dateKey]) {
                window.todos[dateKey] = [];
            }
            
            window.todos[dateKey].push({
                id: Date.now(),
                text: text,
                completed: false,
                categoryId: window.activeCategoryId,
                memo: ''
            });

            window.renderCalendar(); 
            window.renderTodos();
            input.value = '';
            
            window.saveTodosToCloud();
        };

        // 가상 루틴을 실체화하는 헬퍼 함수
        window.ensureRealTask = (idStr, dateKey) => {
            if(typeof idStr !== 'string' || !idStr.startsWith('rout_')) return idStr;
            
            if (!window.todos[dateKey]) window.todos[dateKey] = [];
            const dayTodos = window.todos[dateKey];
            let existing = dayTodos.find(t => t.id === idStr);
            
            if(!existing) {
                const routId = idStr.replace('rout_', '');
                const rout = window.routines.find(r => r.id === routId);
                if(rout) {
                    existing = {
                        id: idStr, // 고유 id로 'rout_R123' 형태를 그대로 씀 (하루에 하나이므로)
                        text: rout.text,
                        completed: false,
                        categoryId: rout.categoryId,
                        routineId: rout.id,
                        isRoutine: true,
                        memo: ''
                    };
                    dayTodos.push(existing);
                }
            }
            return idStr;
        };

        window.toggleTodo = (id) => {
            const dateKey = window.formatDateKey(currentDate);
            const realId = window.ensureRealTask(id, dateKey);
            
            const todayTodos = window.todos[dateKey];
            const todo = todayTodos.find(t => t.id === realId);
            if (todo) {
                todo.completed = !todo.completed;
            }

            window.renderCalendar(); 
            window.renderTodos();
            window.saveTodosToCloud();
        };

        window.toggleTodoDetail = (todoId) => {
            const detail = document.getElementById(`detail-${todoId}`);
            const wrap = document.getElementById(`wrap-${todoId}`);
            if(!detail) return;

            const isOpen = detail.classList.contains('open');
            
            // 다른 열려있는 상세 패널 닫기 (선택사항, 깔끔함을 위해)
            document.querySelectorAll('.todo-detail-panel.open').forEach(p => p.classList.remove('open'));
            document.querySelectorAll('.todo-item.detail-open').forEach(p => p.classList.remove('detail-open'));

            if(!isOpen) {
                detail.classList.add('open');
                wrap.querySelector('.todo-item').classList.add('detail-open');
            }
        };

        window.updateTodoText = async (todoId, newText) => {
            if(!newText.trim()) return;
            const dateKey = window.formatDateKey(currentDate);
            const realId = window.ensureRealTask(todoId, dateKey);
            
            const todo = window.todos[dateKey].find(t => t.id === realId);
            if(!todo) return;

            todo.text = newText.trim();
            await window.saveTodosToCloud();
            window.renderTodos();
        };

        window.updateTodoDate = async (todoId, newDateStr) => {
            if(!newDateStr) return;
            const oldDateKey = window.formatDateKey(currentDate);
            if(oldDateKey === newDateStr) return;

            const realId = window.ensureRealTask(todoId, oldDateKey);
            const todo = window.todos[oldDateKey].find(t => t.id === realId);
            if(!todo) return;

            if(todo.isRoutine) {
                // 루틴의 경우 원래 자리에 tombstone(삭제 표시)을 남기고, 새 날짜로 복제본을 보냄
                todo.deleted = true;
                
                if(!window.todos[newDateStr]) window.todos[newDateStr] = [];
                // 이동하는 곳에서는 일반 할 일처럼 취급할 수도 있으나, 루틴 id 충돌을 막기 위해 새 ID 부여
                const movedTodo = {...todo, id: Date.now(), deleted: false};
                window.todos[newDateStr].push(movedTodo);
            } else {
                // 일반 할 일 이동
                window.todos[oldDateKey] = window.todos[oldDateKey].filter(t => t.id !== realId);
                if(window.todos[oldDateKey].length === 0) delete window.todos[oldDateKey];

                if(!window.todos[newDateStr]) window.todos[newDateStr] = [];
                window.todos[newDateStr].push(todo);
            }

            await window.saveTodosToCloud();
            window.renderCalendar();
            window.renderTodos();
        };

        window.updateTodoMemo = async (todoId, memoText) => {
            const dateKey = window.formatDateKey(currentDate);
            const realId = window.ensureRealTask(todoId, dateKey);
            
            const todo = window.todos[dateKey].find(t => t.id === realId);
            if(!todo) return;

            todo.memo = memoText;
            await window.saveTodosToCloud();
            window.renderTodos();
        };

        window.moveTodoCategory = (id, newCatId) => {
            const dateKey = window.formatDateKey(currentDate);
            const realId = window.ensureRealTask(id, dateKey);
            const todayTodos = window.todos[dateKey] || [];
            const todo = todayTodos.find(t => t.id === realId);
            
            if (todo && newCatId) {
                todo.categoryId = newCatId;
                window.renderCalendar(); 
                window.renderTodos();
                window.saveTodosToCloud();
            }
        };

        window.deleteTodo = (id) => {
            const dateKey = window.formatDateKey(currentDate);
            const realId = window.ensureRealTask(id, dateKey);
            const todo = window.todos[dateKey].find(t => t.id === realId);
            
            if(todo) {
                if(todo.isRoutine) {
                    todo.deleted = true; // 가상 루틴은 완전히 없애지 않고 tombstone 처리하여 다시 안나오게 함
                } else {
                    window.todos[dateKey] = window.todos[dateKey].filter(t => t.id !== realId);
                    if(window.todos[dateKey].length === 0) delete window.todos[dateKey];
                }
            }
            window.renderCalendar();
            window.renderTodos();
            window.saveTodosToCloud();
        };

        window.dragTodoStart = (event, id) => {
            event.dataTransfer.setData("text/plain", id);
            event.target.style.opacity = '0.5';
        };

        window.allowDrop = (event) => {
            event.preventDefault(); // 드롭 허용을 위해 필수
            event.currentTarget.classList.add('drag-over');
        };

        window.leaveDrop = (event) => {
            event.currentTarget.classList.remove('drag-over');
        };

        window.dropTodo = (event, catId) => {
            event.preventDefault();
            event.currentTarget.classList.remove('drag-over');
            const strId = event.dataTransfer.getData("text/plain");
            const todoId = parseInt(strId, 10);
            if(todoId && catId) {
                // 빈 공간에 떨어뜨렸을 때는 목록 맨 끝으로 이동
                window.moveTodoCategory(todoId, catId);
            }
        };

        window.reorderTodo = (dragId, targetId, targetCatId, insertAfter) => {
            const dateKey = window.formatDateKey(currentDate);
            
            // 드래그 대상과 타겟 둘 다 가상 루틴일 수 있으므로 먼저 실체화
            const realDragId = window.ensureRealTask(dragId, dateKey);
            const realTargetId = window.ensureRealTask(targetId, dateKey);

            const todayTodos = window.todos[dateKey] || [];
            
            const dragIndex = todayTodos.findIndex(t => t.id === realDragId);
            if(dragIndex === -1) return;
            
            const dragTodo = todayTodos[dragIndex];
            todayTodos.splice(dragIndex, 1); // 기존 위치에서 제거
            
            let targetIndex = todayTodos.findIndex(t => t.id === realTargetId);
            if(targetIndex === -1) {
                todayTodos.push(dragTodo); 
            } else {
                dragTodo.categoryId = targetCatId; // 카테고리 업데이트
                if(insertAfter) {
                    todayTodos.splice(targetIndex + 1, 0, dragTodo);
                } else {
                    todayTodos.splice(targetIndex, 0, dragTodo);
                }
            }
            
            window.renderTodos();
            window.saveTodosToCloud();
        };

        // --- 루틴 관리 함수들 ---
        let _editRoutineId = null;

        window.openRoutineModal = () => {
            const modal = document.getElementById('routineModal');
            window.hideRoutineForm();
            window.renderRoutineList();
            
            // 카테고리 셀렉트 박스 채우기
            const catSelect = document.getElementById('newRoutineCat');
            catSelect.innerHTML = window.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
            
            modal.style.display = 'flex';
        };

        window.closeRoutineModal = () => {
            document.getElementById('routineModal').style.display = 'none';
        };

        window.showRoutineForm = (routId = null) => {
            _editRoutineId = routId;
            document.getElementById('routineListSection').style.display = 'none';
            document.getElementById('routineFormSection').style.display = 'block';
            document.getElementById('routineModalTitle').innerText = routId ? '루틴 수정' : '루틴 추가';
            document.getElementById('routineFormTitle').innerText = routId ? '루틴 내용 수정' : '새 루틴 정보 입력';
            document.getElementById('btnSaveRoutine').innerText = routId ? '수정 완료' : '등록하기';

            if(routId) {
                const r = window.routines.find(rout => rout.id === routId);
                document.getElementById('newRoutineName').value = r.text;
                document.getElementById('newRoutineCat').value = r.categoryId;
                document.getElementById('routineStart').value = r.startDate;
                document.getElementById('routineEnd').value = r.endDate;
            } else {
                document.getElementById('newRoutineName').value = '';
                const today = window.formatDateKey(new Date());
                document.getElementById('routineStart').value = today;
                document.getElementById('routineEnd').value = today;
            }
        };

        window.hideRoutineForm = () => {
            document.getElementById('routineListSection').style.display = 'block';
            document.getElementById('routineFormSection').style.display = 'none';
            document.getElementById('routineModalTitle').innerText = '루틴 관리';
        };

        window.renderRoutineList = () => {
            const list = document.getElementById('routineList');
            if(window.routines.length === 0) {
                list.innerHTML = `<div class="routine-empty">등록된 루틴이 없습니다.<br>매일 반복되는 할 일을 추가해 보세요!</div>`;
                return;
            }
            
            list.innerHTML = window.routines.map((r, i) => {
                const cat = window.categories.find(c => c.id === r.categoryId) || window.categories[0];
                return `
                    <div class="routine-item">
                        <div class="routine-item-header">
                            <span class="routine-name">${r.text}</span>
                            <div style="display: flex; gap: 8px;">
                                <button class="subject-edit-btn" style="font-size: 14px;" onclick="window.showRoutineForm('${r.id}')">✏️</button>
                                <button class="cat-delete-btn" style="font-size: 20px;" onclick="window.deleteRoutine('${r.id}')">×</button>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; justify-content: space-between;">
                            <span class="routine-tag" style="background:${cat.color}">${cat.name}</span>
                            <div class="routine-meta">
                                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                                ${r.startDate.replace(/-/g,'.')} ~ ${r.endDate.replace(/-/g,'.')}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        };

        window.saveRoutine = () => {
            const name = document.getElementById('newRoutineName').value.trim();
            const catId = document.getElementById('newRoutineCat').value;
            const start = document.getElementById('routineStart').value;
            const end = document.getElementById('routineEnd').value;
            
            if(!name) { alert('루틴 이름을 입력하세요!'); return; }
            if(!start || !end) { alert('기간을 설정하세요!'); return; }
            if(start > end) { alert('종료일이 시작일보다 빠를 수 없습니다.'); return; }
            
            if(_editRoutineId) {
                const idx = window.routines.findIndex(r => r.id === _editRoutineId);
                if(idx !== -1) {
                    window.routines[idx].text = name;
                    window.routines[idx].categoryId = catId;
                    window.routines[idx].startDate = start;
                    window.routines[idx].endDate = end;
                }
            } else {
                window.routines.push({
                    id: 'R' + Date.now(),
                    text: name,
                    categoryId: catId,
                    startDate: start,
                    endDate: end
                });
            }
            
            window.hideRoutineForm();
            window.renderRoutineList();
            window.renderCalendar();
            window.renderTodos();
            window.saveRoutinesToCloud();
        };

        window.deleteRoutine = (id) => {
            if(!confirm('이 루틴을 삭제하시겠습니까? (이미 완료되어 저장된 기록들은 유지됩니다)')) return;
            window.routines = window.routines.filter(r => r.id !== id);
            window.renderRoutineList();
            window.renderCalendar();
            window.renderTodos();
            window.saveRoutinesToCloud();
        };

        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
            @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }
        `;
        document.head.appendChild(style);

        window.goToToday(); 

    </script>
</body>
</html>
